previews:
  generation: manual
  expireAfterDays: 7

services:
  - type: web
    name: vgc-analytics-preview
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    plan: free
    previews:
      generation: manual
    envVars:
      - key: VGC_READ_ONLY
        value: "1"
      - key: VGC_DATABASE
        value: /app/data/preview.duckdb
